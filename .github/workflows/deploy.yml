# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

env:
  DOCKERHUB_REGISTRY: docker.io

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Login to Docker Hub
      id: login-ecr
      uses: docker/login-action@v4
      with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Frontend
      uses: docker/build-push-action@v7
      with:
        context: './client'
        push: true
        tags: |
           ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.ECR_FRONTEND }}:${{ github.sha }}
           ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.ECR_FRONTEND }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Backend
      uses: docker/build-push-action@v7
      with:
        context: './server'
        push: true
        tags: |
          ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.ECR_BACKEND }}:${{ github.sha }}
          ${{ env.DOCKERHUB_REGISTRY }}/${{ secrets.ECR_BACKEND }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Copy docker-compose.prod.yml
      uses: appleboy/scp-action@v1
      with:
        host: ${{secrets.EC2_HOST}}
        username: root
        key: ${{secrets.EC2_SSH_KEY}}
        source: "docker-compose.prod.yml"
        target: /home/ubuntu/stock-watchlist/
    
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: root
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: MONGODB_URI, FINNHUB_API_KEY
        script: |
          cd /home/ubuntu/stock-watchlist

          export ECR_REGISTRY=${{env.DOCKERHUB_REGISTRY}}
          export IMAGE_TAG=${{ github.sha }}
          export MONGODB_URI=$MONGODB_URI
          export FINNHUB_API_KEY=$FINNHUB_API_KEY

          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
          docker image prune -f
      env:
        MONGODB_URI: ${{secrets.MONGODB_URI}}
        FINNHUB_API_KEY: ${{secrets.FINNHUB_API_KEY}}
    

